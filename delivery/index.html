<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow - App Repartidor</title>

    <!-- Styles only in head — NO scripts here! -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="container">
            <div class="header-flex">
                <div class="header-title">
                    <h1><i class="fas fa-shipping-fast"></i> LogiFlow</h1>
                    <p style="color: #94a3b8; font-size: 0.85rem; margin-left: 45px;">Panel de Control de Reparto</p>
                </div>
                <div class="header-datetime">
                    <div id="current-time">00:00:00</div>
                </div>
            </div>
        </div>
    </header>

    <main class="container">

        <div class="management-grid">

            <section class="card">
                <h3 class="section-title"><i class="fas fa-id-card"></i> Acceso</h3>
                <div class="card-content">
                    <input type="text" id="repartidor-id" placeholder="ID Repartidor (Ej: DRV-001)">
                    <button id="btn-cargar-ruta" class="btn-primary">
                        <i class="fas fa-sync-alt"></i> Sincronizar Mi Ruta
                    </button>
                </div>

                <div class="mini-stats">
                    <div class="stat-item"><span>Paradas</span><b id="delivery-count">0</b></div>
                    <div class="stat-item"><span>Lluvia</span><b id="rain-prob">--%</b></div>
                    <div class="stat-item"><span>Tráfico</span><b id="traffic-status">OK</b></div>
                </div>

                <button id="btn-google-maps" class="btn-action btn-maps-modern"
                    style="background:#4285F4; color:white; width:100%; margin-top:15px; border-radius:8px; padding:12px; font-weight:bold;">
                    <i class="fab fa-google"></i> ABRIR RUTA COMPLETA
                </button>
            </section>

            <section class="card">
                <h3 class="section-title"><i class="fas fa-list-ul"></i> Orden de Entrega</h3>
                <div id="delivery-ranking" class="ranking-list">
                    <p class="no-data">Introduce tu ID para recibir la ruta...</p>
                </div>
            </section>

        </div>

        <section class="map-container">
            <div class="map-controls">
                <button id="toggle-route" class="map-btn active" title="Ver Ruta">
                    <i class="fas fa-route"></i>
                </button>
                <button id="toggle-traffic" class="map-btn" title="Ver Tráfico">
                    <i class="fas fa-traffic-light"></i>
                </button>
            </div>
            <div id="map"></div>
        </section>

        <!-- Hidden photo input — must be inside main -->
        <input type="file" id="photo-input" accept="image/*" capture="camera" style="display:none">

    </main>

    <!-- Scripts at bottom in correct order -->
    <!-- 1. Leaflet FIRST — must exist before main.js uses L.map() -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <!-- 2. Your code SECOND -->
    <script src="main.js"></script>

</body>

</html>
