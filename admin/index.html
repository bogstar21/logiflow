<!DOCTYPE html>
<html lang="ua">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LogiFlow Admin | Панель</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="admin-style.css">
</head>

<body>
    <nav class="side-nav">
        <div class="logo">
            <i class="fas fa-shipping-fast"></i>
            <span>LogiFlow</span>
        </div>
        <div class="nav-links">
            <a href="#" class="active">
                <i class="fas fa-grid-2"></i>
                <span data-i18n="dashboard">Панель</span>
            </a>
            <!-- Language Toggle Button -->
            <a href="#" onclick="toggleLanguage(); return false;">
                <i class="fas fa-globe"></i>
                <span id="lang-btn">🇪🇸 ES</span>
            </a>
            <a href="#" onclick="exportCSV(); return false;">
                <i class="fas fa-file-csv"></i>
                <span data-i18n="exportCSV">Експорт CSV</span>
            </a>
        </div>
        <div class="nav-footer">
            <p data-i18n="adminMode">Режим адміна</p>
        </div>
    </nav>

    <main class="main-content">
        <header class="top-bar">
            <div>
                <h1 data-i18n="panelTitle">Панель керування</h1>
                <p id="current-date">Cargando...</p>
            </div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="current-time-admin">00:00:00</div>
                <!-- Logout Button -->
                <button onclick="handleLogout()" class="btn-logout">
                    <i class="fas fa-sign-out-alt"></i> <span data-i18n="logout">Вийти</span>
                </button>
            </div>
        </header>

        <div class="stats-container">
            <!-- Total -->
            <div class="stat-card blue">
                <div class="icon-box"><i class="fas fa-boxes-stacked"></i></div>
                <div class="info">
                    <span class="label" data-i18n="totalPackages">Всього посилок</span>
                    <span class="number" id="total-entregas">0</span>
                </div>
            </div>
            <!-- Pending -->
            <div class="stat-card orange">
                <div class="icon-box"><i class="fas fa-truck-ramp-box"></i></div>
                <div class="info">
                    <span class="label" data-i18n="pendingPackages">Очікується</span>
                    <!-- ✅ ID matches JS: total-pendents -->
                    <span class="number" id="total-pendents">0</span>
                </div>
            </div>
            <!-- Delivered -->
            <div class="stat-card green">
                <div class="icon-box"><i class="fas fa-circle-check"></i></div>
                <div class="info">
                    <span class="label" data-i18n="deliveredPackages">Доставлено</span>
                    <!-- ✅ ID matches JS: total-fet -->
                    <span class="number" id="total-fet">0</span>
                </div>
            </div>
        </div>

        <div class="admin-controls card" style="margin-bottom: 20px;">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" id="admin-search" data-i18n-placeholder="searchPlaceholder"
                    placeholder="Пошук за кодом, адресою або кур'єром..." onkeyup="filterDeliveries()">
            </div>

            <select id="filtro-repartidor" class="admin-select" onchange="filterDeliveries()">
                <option value="all">Всі кур'єри</option>
            </select>

            <div class="filter-group">
                <button class="btn-filter active" onclick="setFilter('all', this)" data-i18n="filterAll">Всі</button>
                <button class="btn-filter" onclick="setFilter('pending', this)"
                    data-i18n="filterPending">Очікується</button>
                <button class="btn-filter" onclick="setFilter('delivered', this)"
                    data-i18n="filterDelivered">Доставлено</button>
                <button class="btn-map" onclick="openGlobalMap()">
                    <i class="fas fa-map-marked-alt"></i>
                    <span data-i18n="globalMap">Переглянути карту</span>
                </button>
            </div>
        </div>

        <!-- Map Modal -->
        <div id="modal-mapa" class="modal">
            <div class="modal-content">
                <span class="close" onclick="closeGlobalMap()">&times;</span>
                <div id="mapa-global" style="height: 500px; width: 100%; border-radius: 12px;"></div>
            </div>
        </div>

        <section class="data-section">
            <div class="table-header">
                <h3 data-i18n="activityMonitor">Монітор активності</h3>
                <button class="btn-download" onclick="exportCSV()">
                    <i class="fas fa-download"></i>
                    <span data-i18n="downloadReport">Завантажити звіт</span>
                </button>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th data-i18n="colId">ID посилки</th>
                            <th data-i18n="colDest">Адреса</th>
                            <th data-i18n="colStatus">Поточний статус</th>
                            <th data-i18n="colPhoto">Фото</th>
                            <th data-i18n="colAssigned">Кур'єр</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Supabase SDK — needed for auth guard in admin.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>

</html>
