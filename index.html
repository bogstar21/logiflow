<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiFlow | Logistics Ecosystem</title>
    <link rel="icon" type="image/png" href="logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #6366f1;
            --driver-color: #38bdf8;
            --admin-color: #a855f7;
            --client-color: #10b981;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .hub-container {
            text-align: center;
            max-width: 1000px;
            padding: 20px;
            z-index: 2;
        }

        .header {
            margin-bottom: 60px;
        }

        .logo-large {
            font-size: 3.5rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
        }

        .app-card {
            background: var(--card-bg);
            padding: 40px 30px;
            border-radius: 24px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Colores por Rol en Hover */
        .card-driver:hover {
            border-color: var(--driver-color);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.2);
        }

        .card-admin:hover {
            border-color: var(--admin-color);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.2);
        }

        .card-client:hover {
            border-color: var(--client-color);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.2);
        }

        .app-card:hover {
            transform: translateY(-12px);
            background: rgba(255, 255, 255, 0.02);
        }

        .icon-circle {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            transition: 0.4s;
        }

        .card-driver .icon-circle {
            color: var(--driver-color);
        }

        .card-admin .icon-circle {
            color: var(--admin-color);
        }

        .card-client .icon-circle {
            color: var(--client-color);
        }

        .app-card:hover .icon-circle {
            transform: scale(1.1) rotate(-5deg);
            color: white;
        }

        .card-driver:hover .icon-circle {
            background: var(--driver-color);
        }

        .card-admin:hover .icon-circle {
            background: var(--admin-color);
        }

        .card-client:hover .icon-circle {
            background: var(--client-color);
        }

        h3 {
            margin: 10px 0;
            font-size: 1.4rem;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        /* Language Toggle Style */
        .lang-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            z-index: 100;
            transition: 0.3s;
        }

        .lang-toggle:hover {
            background: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>

<body>

    <button id="lang-btn" class="lang-toggle" onclick="toggleLanguage()">🇺🇦 UA</button>

    <div class="hub-container">
        <div class="header">
            <div class="logo-large"><i class="fas fa-route"></i><span>LogiFlow</span></div>
            <p class="subtitle" data-i18n="subtitle">Екосистема логістики останньої милі</p>
        </div>

        <div class="grid">
            <a href="login/login.html?role=driver" class="app-card card-driver">
                <div class="icon-circle"><i class="fas fa-motorcycle"></i></div>
                <h3 data-i18n="driverTitle">Driver App</h3>
                <p data-i18n="driverDesc">Керування маршрутами, GPS-навігація та підтвердження доставки.</p>
            </a>

            <a href="login/login.html?role=admin" class="app-card card-admin">
                <div class="icon-circle"><i class="fas fa-chart-line"></i></div>
                <h3 data-i18n="adminTitle">Control Panel</h3>
                <p data-i18n="adminDesc">Моніторинг автопарку та управління замовленнями для адміністрації.</p>
            </a>

            <a href="https://logiflow-client.netlify.app/" target="_blank" class="app-card card-client">
                <div class="icon-circle"><i class="fas fa-box-open"></i></div>
                <h3 data-i18n="clientTitle">Customer Portal</h3>
                <p data-i18n="clientDesc">Відстеження посилок у режимі реального часу для кінцевого споживача.</p>
            </a>
        </div>
    </div>

    <script>
        const TRANSLATIONS = {
            es: {
                subtitle: "Ecosistema inteligente de logística de última milla",
                driverTitle: "Driver App",
                driverDesc: "Gestión de rutas, navegación GPS y evidencias de entrega.",
                adminTitle: "Control Panel",
                adminDesc: "Monitorización de flota y gestión de pedidos para administración.",
                clientTitle: "Customer Portal",
                clientDesc: "Seguimiento de paquetes en tiempo real para el cliente final."
            },
            ua: {
                subtitle: "Інтелектуальна екосистема логістики останньої милі",
                driverTitle: "Driver App",
                driverDesc: "Керування маршрутами, GPS-навігація та підтвердження доставки.",
                adminTitle: "Control Panel",
                adminDesc: "Моніторинг автопарку та управління замовленнями для адміністрації.",
                clientTitle: "Customer Portal",
                clientDesc: "Відстеження посилок у режимі реального часу для кінцевого споживача."
            }
        };

        let currentLang = localStorage.getItem("logiflow_lang") || "ua";

        function updateUI() {
            document.querySelectorAll("[data-i18n]").forEach(el => {
                const key = el.getAttribute("data-i18n");
                el.textContent = TRANSLATIONS[currentLang][key];
            });
            document.getElementById("lang-btn").textContent = currentLang === "es" ? "🇺🇦 UA" : "🇪🇸 ES";
        }

        function toggleLanguage() {
            currentLang = currentLang === "es" ? "ua" : "es";
            localStorage.setItem("logiflow_lang", currentLang);
            updateUI();
        }

        document.addEventListener("DOMContentLoaded", updateUI);
    </script>

</body>

</html>
